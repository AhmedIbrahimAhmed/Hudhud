server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (task attachments / archives can be up to ~50 MB).
    client_max_body_size 60m;

    # Reverse-proxy the API to the backend container. The Vite dev server does
    # this via its `proxy` config; in production nginx takes over the same job.
    # `Upgrade`/`Connection` headers keep the real-time transcription WebSocket
    # (/api/transcribe/stream) working.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Uploaded avatars served by the backend.
    location /uploads/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: any unknown path returns index.html so client-side routing
    # works on reload / deep links.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Map for WebSocket upgrade: "upgrade" when the client requests it, else close.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
